services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groovegraph}
      POSTGRES_USER: ${POSTGRES_USER:-groovegraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groovegraph}
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-groovegraph} -d ${POSTGRES_DB:-groovegraph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-26379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.25.8
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    ports:
      - "${WEAVIATE_HTTP_PORT:-28080}:8080"
      - "${WEAVIATE_GRPC_PORT:-25051}:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 5s
      retries: 8

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-groovegraph-password}
    ports:
      - "${NEO4J_HTTP_PORT:-27474}:7474"
      - "${NEO4J_BOLT_PORT:-27687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://groovegraph:groovegraph@postgres:5432/groovegraph}
      FERNET_SECRET: ${FERNET_SECRET:-groovegraph-local-dev-fernet-secret-change-me}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-groovegraph-password}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8100/auth/spotify/callback}
      SPOTIFY_LIKED_SONGS_PLAYLIST_ID: ${SPOTIFY_LIKED_SONGS_PLAYLIST_ID:-}
      SPOTIFY_LIKED_SONGS_PLAYLIST_NAME: ${SPOTIFY_LIKED_SONGS_PLAYLIST_NAME:-Lieblingssongs}
      DEV_USER_EMAIL: ${DEV_USER_EMAIL:-listener@groovegraph.local}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-GrooveGraph/0.1.0 (https://localhost; contact@example.com)}
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    ports:
      - "${API_HOST_PORT:-8100}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/health')); assert data['status'] == 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://groovegraph:groovegraph@postgres:5432/groovegraph}
      FERNET_SECRET: ${FERNET_SECRET:-groovegraph-local-dev-fernet-secret-change-me}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-groovegraph-password}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8100/auth/spotify/callback}
      SPOTIFY_LIKED_SONGS_PLAYLIST_ID: ${SPOTIFY_LIKED_SONGS_PLAYLIST_ID:-}
      SPOTIFY_LIKED_SONGS_PLAYLIST_NAME: ${SPOTIFY_LIKED_SONGS_PLAYLIST_NAME:-Lieblingssongs}
      DEV_USER_EMAIL: ${DEV_USER_EMAIL:-listener@groovegraph.local}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-GrooveGraph/0.1.0 (https://localhost; contact@example.com)}
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8100}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
    ports:
      - "${WEB_PORT:-3100}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  weaviate_data:
  neo4j_data:
