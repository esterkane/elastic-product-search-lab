services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION:-v24.3.6}
    container_name: elastic-product-search-lab-redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:${REDPANDA_CONSOLE_VERSION:-v2.8.5}
    container_name: elastic-product-search-lab-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SERVER_LISTENPORT: "8080"
    ports:
      - "8080:8080"

  redpanda-topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION:-v24.3.6}
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "rpk topic create --brokers=redpanda:9092 -p 3 -r 1
      product.catalog product.price product.inventory product.reviews product.analytics
      product-change price-stock merchandising delete product.dlq || true"

volumes:
  redpanda_data:
