name: Evaluation

on:
  workflow_dispatch:
    inputs:
      query_set:
        description: Query set label to evaluate
        required: true
        default: smoke
      run_inventory:
        description: Refresh repository manifest before evaluation
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  deterministic-eval:
    name: Deterministic Retrieval Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Optionally refresh inventory manifest
        if: ${{ inputs.run_inventory }}
        run: python tools/repo_inventory.py

      - name: Run deterministic tests
        run: python -m pytest backend/tests/test_recommendations.py backend/tests/test_ingest_pipeline.py -p no:cacheprovider

      - name: Record evaluation summary
        run: |
          mkdir -p artifacts/eval
          {
            echo "query_set=${{ inputs.query_set }}"
            echo "metrics=NDCG@10,MRR@10,Recall@20"
            echo "deterministic_ordering=true"
            echo "source_attribution_required=true"
          } > artifacts/eval/summary.txt

      - name: Upload evaluation summary
        uses: actions/upload-artifact@v4
        with:
          name: eval-summary-${{ inputs.query_set }}
          path: artifacts/eval/summary.txt
